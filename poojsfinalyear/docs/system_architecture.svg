<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <style>
    .box { fill: #0b3d91; stroke: #06306a; stroke-width: 2px; rx: 8px; }
    .box-alt { fill: #0f766e; stroke: #064a43; stroke-width: 2px; rx: 8px; }
    .text { font-family: Arial, Helvetica, sans-serif; fill: #fff; font-size: 14px; }
    .title { font-family: Arial, Helvetica, sans-serif; fill: #111827; font-weight: bold; font-size: 20px; }
    .small { font-size: 12px; fill: #111827; }
    .arrow { stroke: #111827; stroke-width: 2px; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="36" class="title">System Architecture — Smart Nutritional Meal Planner</text>
  <text x="40" y="56" class="small">Frontend (Streamlit) ↔ Backend (API / Streamlit server) ↔ ML Model & Data</text>

  <!-- User Browser -->
  <rect x="40" y="90" width="200" height="80" rx="10" class="box-alt"/>
  <text x="140" y="125" class="text" text-anchor="middle">User Browser</text>
  <text x="140" y="142" class="text" text-anchor="middle">(Streamlit UI)</text>

  <!-- Frontend App -->
  <rect x="280" y="60" width="260" height="120" rx="10" class="box"/>
  <text x="410" y="95" class="text" text-anchor="middle">Streamlit App</text>
  <text x="410" y="112" class="text" text-anchor="middle">Inputs & Visualization</text>

  <!-- Backend Server -->
  <rect x="600" y="40" width="260" height="150" rx="10" class="box-alt"/>
  <text x="730" y="80" class="text" text-anchor="middle">Backend / API</text>
  <text x="730" y="100" class="text" text-anchor="middle">Preprocessing & Feature Engine</text>
  <text x="730" y="116" class="text" text-anchor="middle">(Flask / FastAPI / Streamlit Server)</text>

  <!-- ML Model Service -->
  <rect x="920" y="80" width="240" height="120" rx="10" class="box"/>
  <text x="1040" y="110" class="text" text-anchor="middle">ML Model Service</text>
  <text x="1040" y="128" class="text" text-anchor="middle">(Joblib / XGBoost / LightGBM)</text>

  <!-- Data Storage -->
  <rect x="600" y="220" width="260" height="100" rx="10" class="box"/>
  <text x="730" y="255" class="text" text-anchor="middle">Datasets</text>
  <text x="730" y="272" class="text" text-anchor="middle">CSV / DB (INDB.csv, diets)</text>

  <!-- Metrics & Monitoring -->
  <rect x="920" y="220" width="240" height="100" rx="10" class="box-alt"/>
  <text x="1040" y="255" class="text" text-anchor="middle">Metrics & Monitoring</text>
  <text x="1040" y="272" class="text" text-anchor="middle">(Prometheus / Streamlit Dashboard)</text>

  <!-- Storage -->
  <rect x="40" y="220" width="200" height="110" rx="10" class="box"/>
  <text x="140" y="255" class="text" text-anchor="middle">Persistence</text>
  <text x="140" y="272" class="text" text-anchor="middle">user_progress.json / models/</text>

  <!-- Arrows: User -> Frontend -> Backend -> Model -->
  <line x1="240" y1="130" x2="280" y2="130" class="arrow"/>
  <line x1="540" y1="130" x2="600" y2="130" class="arrow"/>
  <line x1="860" y1="130" x2="920" y2="130" class="arrow"/>

  <!-- Arrows: Backend -> Datasets and Metrics -->
  <line x1="730" y1="190" x2="730" y2="220" class="arrow"/>
  <line x1="860" y1="160" x2="920" y2="160" class="arrow"/>

  <!-- Arrows: Model -> Metrics & Storage -->
  <line x1="1040" y1="200" x2="1040" y2="220" class="arrow"/>
  <line x1="1040" y1="200" x2="760" y2="200" class="arrow"/>

  <!-- Bidirectional arrow: Frontend <-> Backend (requests & real-time updates) -->
  <line x1="540" y1="100" x2="540" y2="80" class="arrow"/>
  <line x1="540" y1="80" x2="540" y2="100" class="arrow"/>
  <line x1="240" y1="110" x2="240" y2="100" class="arrow"/>

  <!-- Sequence labels -->
  <text x="170" y="180" class="small">1. User fills inputs (age, height, disease, allergies)</text>
  <text x="420" y="180" class="small">2. Frontend sends request / updates UI</text>
  <text x="730" y="190" class="small">3. Backend preprocesses inputs & fetches data</text>
  <text x="1040" y="190" class="small">4. ML inference returns diet recommendation</text>
  <text x="760" y="320" class="small">5. Post-processing, filters, meal planner</text>
  <text x="1040" y="340" class="small">6. Metrics collected & dashboard updated</text>

  <!-- Legend -->
  <rect x="40" y="360" width="1120" height="140" rx="6" fill="#f5f7ff" stroke="#e6eefc"/>
  <text x="60" y="385" class="small" fill="#111827">Legend:</text>
  <text x="60" y="405" class="small" fill="#111827">• Streamlit UI: Primary user interface</text>
  <text x="60" y="425" class="small" fill="#111827">• Backend: Preprocessing, rules, orchestration (can be same as Streamlit process or separate API)</text>
  <text x="60" y="445" class="small" fill="#111827">• ML Model Service: Model file / service for inference</text>
  <text x="60" y="465" class="small" fill="#111827">• Metrics: Captures model performance and app metrics; optionally Prometheus/Grafana or built-in Streamlit visualizations</text>

</svg>