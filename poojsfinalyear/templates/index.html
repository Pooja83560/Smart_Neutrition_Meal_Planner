<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Meal Planner Form</title>
    <link rel="stylesheet" href="/static/style.css?v=2025">
</head>
<body>
    <div class="container">
        <h1>AI Meal Planner Form</h1>
        <form action="/plan" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="1" max="120" required>

            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" name="weight" step="0.1" required>

            <label for="height">Height (cm):</label>
            <input type="number" id="height" name="height" step="0.1" required>

            <label for="gender">Gender:</label>
            <select id="gender" name="gender">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <label for="disease">Health Condition:</label>
            <select id="disease" name="disease">
                {% for d in diseases %}
                <option>{{ d }}</option>
                {% endfor %}
            </select>

            <label for="activity_level">Activity Level:</label>
            <select id="activity_level" name="activity_level">
                <option>Sedentary</option>
                <option>Lightly Active</option>
                <option selected>Moderately Active</option>
                <option>Very Active</option>
            </select>

            <label for="allergies">Allergies (comma-separated):</label>
            <input type="text" id="allergies" name="allergies" placeholder="None">

            <label for="plan_type">Meal Plan Type:</label>
            <select id="plan_type" name="plan_type">
                <option>Daywise</option>
                <option selected>Weekly</option>
            </select>

            <label for="diet_pref">Dietary Preference:</label>
            <select id="diet_pref" name="diet_pref">
                <option selected>Non-Veg</option>
                <option>Veg</option>
                <option>Vegan</option>
            </select>

            <button type="submit" class="btn-primary">Generate Meal Plan</button>
        </form>
    </div>
</body>
</html>
